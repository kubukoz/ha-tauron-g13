# Tauron G13 — complete dashboard.
#
# This is a WHOLE dashboard (top-level `views:`). Paste it as the entire
# contents of:  Dashboard -> Edit -> ⋮ -> Raw configuration editor
#
# The timeline strip uses the "ApexCharts Card" frontend resource, installed
# via HACS (https://github.com/RomRider/apexcharts-card). The Entities and
# Calendar cards are built in and need nothing extra.

title: Energy
views:
  - title: Tauron G13
    path: tauron-g13
    icon: mdi:transmission-tower
    cards:
      # ---- At-a-glance: current zone + countdown ------------------------- #
      - type: entities
        title: Tauron G13 — now
        show_header_toggle: false
        entities:
          - entity: sensor.tauron_g13_zone
            name: Current zone
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: minutes_until_change
            name: Changes in (min)
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: next_zone
            name: Next zone
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: next_change
            name: At
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: season
            name: Season

      # ---- Cheap / peak flags as glanceable badges ----------------------- #
      - type: glance
        title: Right now
        entities:
          - entity: binary_sensor.tauron_g13_is_cheap
            name: Cheap
          - entity: binary_sensor.tauron_g13_is_peak
            name: Peak

      # ---- Timeline strip: the bundled custom card ----------------------- #
      #
      # `tauron-g13-timeline` ships WITH the integration and auto-registers
      # itself as a Lovelace resource (storage mode), so there is no separate
      # HACS card to install. It reads the zone sensor's `timeline` attribute
      # and draws past + future zones like HA's history "timeline" row: merged
      # same-zone segments, boundary time labels, a "now" marker, and per-segment
      # hover tooltips. The window (−4h…+24h by default) is set in the
      # integration's Options. `entity` and `title` are optional.
      - type: custom:tauron-g13-timeline
        title: G13 zones (−4h … +24h)
        entity: sensor.tauron_g13_zone

      # ---- Future blocks as a color-coded agenda ------------------------- #
      #
      # Atomic Calendar Revive (HACS) lets a single calendar entity be listed
      # several times with an `allowlist` regex (matched against the event
      # summary) and its own `color`. We split the one zones calendar into three
      # colored streams by the English zone word in the summary, e.g.
      # "Szczyt (peak)" / "Przedpołudnie (mid)" / "Pozaszczytowa (off-peak)".
      #
      # NOTE: the off-peak summary also contains the substring "peak", so the
      # peak allowlist is anchored on "(peak)" and off-peak on "(off-peak)".
      - type: custom:atomic-calendar-revive
        name: Upcoming zones
        showDate: true
        maxDaysToShow: 7
        showNoEventsForToday: true
        entities:
          - entity: calendar.tauron_g13_zones
            allowlist: '\(peak\)'
            color: '#c62828'   # peak — red
          - entity: calendar.tauron_g13_zones
            allowlist: '\(mid\)'
            color: '#f9a825'   # mid — amber
          - entity: calendar.tauron_g13_zones
            allowlist: '\(off-peak\)'
            color: '#2e7d32'   # offpeak — green

      # NOTE: there is deliberately no built-in `history-graph` card for the
      # zone here. Home Assistant excludes the `sensor` domain from state
      # colouring (it isn't in STATE_COLORED_DOMAIN), so history-graph paints
      # the enum states with an arbitrary cycling palette — e.g. off-peak comes
      # out red, which is exactly backwards. The SVG strip above already shows
      # the recent past (its −Nh window) with correct green/amber/red, so it is
      # the single, consistently-coloured timeline for both past and future.
      # Widen the past via the integration's Options (hours behind) if you want
      # more history in the strip.
