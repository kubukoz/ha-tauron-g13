# Tauron G13 — complete dashboard.
#
# This is a WHOLE dashboard (top-level `views:`). Paste it as the entire
# contents of:  Dashboard -> Edit -> ⋮ -> Raw configuration editor
#
# The timeline strip uses the "ApexCharts Card" frontend resource, installed
# via HACS (https://github.com/RomRider/apexcharts-card). The Entities and
# Calendar cards are built in and need nothing extra.

title: Energy
views:
  - title: Tauron G13
    path: tauron-g13
    icon: mdi:transmission-tower
    cards:
      # ---- At-a-glance: current zone + countdown ------------------------- #
      - type: entities
        title: Tauron G13 — now
        show_header_toggle: false
        entities:
          - entity: sensor.tauron_g13_zone
            name: Current zone
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: minutes_until_change
            name: Changes in (min)
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: next_zone
            name: Next zone
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: next_change
            name: At
          - type: attribute
            entity: sensor.tauron_g13_zone
            attribute: season
            name: Season

      # ---- Cheap / peak flags as glanceable badges ----------------------- #
      - type: glance
        title: Right now
        entities:
          - entity: binary_sensor.tauron_g13_is_cheap
            name: Cheap
          - entity: binary_sensor.tauron_g13_is_peak
            name: Peak

      # ---- Timeline strip: last 4h … next 12h (ApexCharts) --------------- #
      - type: custom:apexcharts-card
        graph_span: 16h
        span:
          start: hour
          offset: "-4h"
        experimental:
          color_threshold: true
        header:
          show: true
          title: G13 zones (−4h … +12h)
          show_states: true
        now:
          show: true
          label: now
        yaxis:
          - min: 0
            max: 2
            decimals: 0
            apex_config:
              tickAmount: 2
        series:
          - entity: sensor.tauron_g13_zone
            name: Zone
            type: column
            # Map the enum to a number so it plots: offpeak=0, mid=1, peak=2.
            transform: >-
              return { offpeak: 0, mid: 1, peak: 2 }[x] ?? 0;
            color_threshold:
              - value: 0
                color: "#2e7d32"   # offpeak — green
              - value: 1
                color: "#f9a825"   # mid — amber
              - value: 2
                color: "#c62828"   # peak — red

      # ---- Future blocks as a native calendar timeline ------------------- #
      - type: calendar
        title: Upcoming zones
        initial_view: listDay
        entities:
          - calendar.tauron_g13_zones

      # ---- History: how the zone moved over the last day ----------------- #
      - type: history-graph
        title: Zone history (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.tauron_g13_zone
            name: Zone
